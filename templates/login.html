<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Portal Clase 1114</title>
</head>
{% extends "base.html" %}

{% block title %}Login - Clase 1114{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">

        <h1 class="mb-4">Login Portal Clase 1114</h1>

        {% if mensaje %}
        <div class="alert alert-danger">
            {{ mensaje }}
        </div>
        {% endif %}

        <form method="POST">

            <div class="mb-3">
                <label for="usuario" class="form-label">Usuario:</label>
                <input
                    type="text"
                    class="form-control"
                    name="usuario"
                    id="usuario"
                    required>
            </div>

            <div class="mb-3">
                <label for="contraseña" class="form-label">Contraseña:</label>
                <input
                    type="password"
                    class="form-control"
                    name="contraseña"
                    id="contraseña"
                    required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Iniciar sesión
            </button>

        </form>

        <hr>

        <div class="alert alert-info mt-3">
            <strong>Datos de prueba:</strong><br>
            Profesor: usuario = henry<br>
            Contraseña = password123
        </div>

    </div>
</div>
{% endblock %}
</body>
</html>
